<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amansala · Fechas Disponibles</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5f0e8;
    --teal: #2a6b6b;
    --teal-light: #3d8f8f;
    --teal-faint: #e8f2f2;
    --clay: #c4714a;
    --clay-light: #f0d5c8;
    --ink: #1a2424;
    --mist: #7a9090;
    --white: #fdfcfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--sand); color: var(--ink); font-family: 'DM Mono', monospace; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 10% 90%, rgba(42,107,107,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 10%, rgba(196,113,74,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 48px 24px 80px; }

  .header { text-align: center; margin-bottom: 40px; }
  .header-eyebrow { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--mist); margin-bottom: 10px; }
  .header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,5vw,3rem); font-weight: 300; color: var(--teal); }
  .header h1 em { font-style: italic; }
  .divider { width: 40px; height: 1px; background: var(--teal); margin: 16px auto; opacity: 0.4; }
  .header-sub { font-size: 11px; color: var(--mist); }

  .config-panel { background: var(--white); border: 1px solid rgba(42,107,107,0.15); border-radius: 4px; padding: 28px 32px; margin-bottom: 28px; box-shadow: 0 2px 20px rgba(26,36,36,0.04); }
  .config-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mist); margin-bottom: 20px; }
  .fields-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media(max-width:600px){ .fields-row { grid-template-columns: 1fr; } }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mist); }
  .field-group input { background: var(--sand); border: 1px solid rgba(42,107,107,0.2); border-radius: 3px; padding: 10px 12px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .field-group input:focus { border-color: var(--teal); }

  .nights-filter { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center; }
  .nights-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mist); margin-right: 4px; }
  .night-btn { background: transparent; border: 1px solid rgba(42,107,107,0.25); border-radius: 20px; padding: 5px 14px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--mist); cursor: pointer; transition: all 0.15s; }
  .night-btn.active { background: var(--teal); border-color: var(--teal); color: white; }
  .night-btn:hover:not(.active) { border-color: var(--teal); color: var(--teal); }

  .error-msg { background: #fdf0ec; border: 1px solid var(--clay-light); border-radius: 3px; padding: 12px 16px; font-size: 12px; color: var(--clay); display: none; margin-bottom: 16px; }
  .error-msg.visible { display: block; }
  .btn-search { width: 100%; background: var(--teal); color: white; border: none; border-radius: 3px; padding: 14px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .btn-search:hover { background: var(--teal-light); }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

  .status { text-align: center; padding: 24px; font-size: 11px; color: var(--mist); letter-spacing: 0.1em; display: none; }
  .status.visible { display: block; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--teal-faint); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-strip { display: none; gap: 2px; margin-bottom: 32px; }
  .summary-strip.visible { display: flex; }
  .summary-chip { flex: 1; background: var(--white); border: 1px solid rgba(42,107,107,0.15); border-radius: 3px; padding: 12px 16px; text-align: center; }
  .chip-count { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--teal); display: block; line-height: 1; }
  .chip-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mist); display: block; margin-top: 4px; }

  .rooms-panel { background: var(--white); border: 1px solid rgba(42,107,107,0.15); border-radius: 4px; padding: 20px 24px; margin-bottom: 32px; display: none; }
  .rooms-panel.visible { display: block; }
  .rooms-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mist); margin-bottom: 14px; }
  .rooms-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .room-tag { background: var(--teal-faint); color: var(--teal); padding: 4px 12px; border-radius: 20px; font-size: 11px; }
  .rooms-note { font-size: 10px; color: var(--mist); line-height: 1.6; }

  .month-section { margin-bottom: 36px; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .month-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid rgba(42,107,107,0.12); }
  .month-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--teal); }
  .month-count { font-size: 10px; color: var(--mist); letter-spacing: 0.1em; }

  .night-group { margin-bottom: 16px; }
  .night-group-header { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mist); margin-bottom: 8px; }
  .windows-list { display: flex; flex-wrap: wrap; gap: 8px; }

  .window-chip { background: var(--white); border: 1px solid rgba(42,107,107,0.15); border-radius: 3px; padding: 8px 14px; font-size: 11px; cursor: pointer; transition: all 0.12s; display: flex; flex-direction: column; gap: 2px; }
  .window-chip:hover { border-color: var(--teal); background: var(--teal-faint); }
  .window-dates { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; color: var(--ink); }
  .window-dow { font-size: 9px; color: var(--mist); letter-spacing: 0.06em; }
  .wc-3 { border-left: 3px solid #2a7a5a; }
  .wc-4 { border-left: 3px solid var(--teal); }
  .wc-5 { border-left: 3px solid #3a5fa0; }
  .wc-6 { border-left: 3px solid #6040a0; }
  .wc-7 { border-left: 3px solid #a06020; }

  .empty-state { text-align: center; padding: 48px; display: none; }
  .empty-state.visible { display: block; }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: var(--mist); }

  .programs-section { margin-top: 40px; display: none; }
  .programs-section.visible { display: block; }
  .programs-toggle { background: none; border: none; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mist); cursor: pointer; padding: 0; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .programs-toggle .arrow { transition: transform 0.2s; }
  .programs-toggle.open .arrow { transform: rotate(90deg); }
  .programs-list { display: none; background: var(--white); border: 1px solid rgba(42,107,107,0.12); border-radius: 4px; overflow: hidden; }
  .programs-list.open { display: block; }
  .prog-row { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; padding: 10px 16px; border-bottom: 1px solid rgba(42,107,107,0.06); font-size: 11px; align-items: center; }
  .prog-row:last-child { border-bottom: none; }
  .prog-row:nth-child(even) { background: var(--sand); }
  .prog-name { color: var(--ink); }
  .prog-range { color: var(--mist); font-size: 10px; white-space: nowrap; }
  .prog-nights-badge { background: var(--teal-faint); color: var(--teal); padding: 2px 8px; border-radius: 10px; font-size: 10px; }

  .footer { text-align: center; margin-top: 60px; font-size: 10px; color: var(--mist); opacity: 0.5; letter-spacing: 0.1em; }
  .copied-tip { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--teal); color: white; padding: 8px 20px; border-radius: 20px; font-size: 11px; letter-spacing: 0.1em; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 100; }
  .copied-tip.show { opacity: 1; }

  .debug-toggle { background: none; border: 1px dashed rgba(42,107,107,0.2); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--mist); cursor: pointer; padding: 6px 12px; margin-top: 16px; }
  .debug-panel { display: none; background: #1a2424; color: #88cccc; font-size: 11px; padding: 16px; border-radius: 4px; margin-top: 8px; overflow: auto; max-height: 320px; white-space: pre-wrap; line-height: 1.5; }
  .debug-panel.open { display: block; }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <p class="header-eyebrow">Amansala · Tulum</p>
    <h1>Fechas <em>Disponibles</em></h1>
    <div class="divider"></div>
    <p class="header-sub">Ventanas de estadía por mes · Venue Calendar</p>
  </header>

  <div class="config-panel">
    <p class="config-title">Configuración</p>
    <div style="display:none"><input type="text" id="apiToken"></div>
    <div class="fields-row">
      <div class="field-group">
        <label>Desde</label>
        <input type="date" id="dateFrom">
      </div>
      <div class="field-group">
        <label>Hasta</label>
        <input type="date" id="dateTo">
      </div>
      <div class="field-group">
        <label>Mín. noches por ventana</label>
        <input type="number" id="minNights" value="3" min="1" max="30">
      </div>
    </div>
    <div class="nights-filter">
      <span class="nights-label">Mostrar:</span>
      <button class="night-btn active" data-n="3">3 noches</button>
      <button class="night-btn active" data-n="4">4 noches</button>
      <button class="night-btn active" data-n="5">5 noches</button>
      <button class="night-btn active" data-n="6">6 noches</button>
      <button class="night-btn active" data-n="7">7 noches</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-search" id="btnSearch" onclick="runSearch()">Buscar fechas disponibles</button>
  </div>

  <div class="status" id="status">
    <span class="spinner"></span><span id="statusText">Consultando…</span>
  </div>

  <div class="summary-strip" id="summaryStrip"></div>

  <div id="roomsPanel" class="rooms-panel">
    <p class="rooms-title">Habitaciones detectadas</p>
    <div class="rooms-grid" id="roomsGrid"></div>
    <p class="rooms-note" id="roomsNote"></p>
  </div>

  <div id="resultsArea"></div>
  <div class="empty-state" id="emptyState"><p>No hay ventanas disponibles con los filtros seleccionados.</p></div>

  <div class="programs-section" id="programsSection">
    <button class="programs-toggle" id="programsToggle" onclick="togglePrograms()">
      <span class="arrow">▶</span><span>Ver programas consultados</span>
    </button>
    <div class="programs-list" id="programsList"></div>
  </div>

  <div style="text-align:center">
    <button class="debug-toggle" onclick="document.getElementById('debugPanel').classList.toggle('open')">
      🔍 Ver datos crudos de API (habitaciones)
    </button>
    <div class="debug-panel" id="debugPanel"></div>
  </div>

  <div class="footer">amansala.com · retreat.guru API v1</div>
</div>
<div class="copied-tip" id="copiedTip">¡Copiado!</div>

<script>
const DOMAIN = 'amansala.secure.retreat.guru';
const SAVED_TOKEN = '687eadc2c7252989d8c4f148f24bfc7b';
const DAYS   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_S = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

document.getElementById('apiToken').value = SAVED_TOKEN;
const today = new Date();
document.getElementById('dateFrom').value = fmtISO(today);
const toD = new Date(today); toD.setFullYear(toD.getFullYear()+1);
document.getElementById('dateTo').value = fmtISO(toD);
document.querySelectorAll('.night-btn').forEach(b => b.addEventListener('click', () => b.classList.toggle('active')));

function fmtISO(d) { return d.toISOString().split('T')[0]; }
function parseISO(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function diffDays(a,b) { return Math.round((b-a)/86400000); }
function fmtShort(d) { return `${d.getDate()} ${MONTHS_S[d.getMonth()]}`; }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function showError(m) { const e=document.getElementById('errorMsg'); e.textContent=m; e.classList.add('visible'); }
function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }
function setStatus(m,show) { document.getElementById('statusText').textContent=m; document.getElementById('status').classList.toggle('visible',show); }

async function fetchAll(token) {
  let all=[], page=1;
  while(true) {
    const res=await fetch(`https://${DOMAIN}/api/v1/programs?token=${encodeURIComponent(token)}&limit=100&page=${page}`);
    if(!res.ok) throw new Error(`API ${res.status}`);
    const data=await res.json();
    if(!Array.isArray(data)||data.length===0) break;
    all=all.concat(data); if(data.length<100) break; page++;
  }
  return all;
}

async function fetchRegistrations(token, minDate, maxDate) {
  let all=[], page=1;
  while(true) {
    const res=await fetch(`https://${DOMAIN}/api/v1/registrations?token=${encodeURIComponent(token)}&limit=100&page=${page}&min_stay=${minDate}&max_stay=${maxDate}`);
    if(!res.ok) break;
    const data=await res.json();
    if(!Array.isArray(data)||data.length===0) break;
    all=all.concat(data); if(data.length<100) break; page++;
  }
  return all;
}

function findGaps(programs, fromDate, toDate) {
  const ranges=programs
    .filter(p=>p.start_date&&p.end_date)
    .map(p=>({start:parseISO(p.start_date),end:parseISO(p.end_date)}))
    .filter(r=>r.end>=fromDate&&r.start<=toDate)
    .sort((a,b)=>a.start-b.start);
  const gaps=[]; let cursor=new Date(fromDate);
  for(const r of ranges) {
    if(r.start>cursor) {
      const gs=new Date(cursor), ge=new Date(r.start); ge.setDate(ge.getDate()-1);
      const n=diffDays(gs,ge)+1; if(n>=1) gaps.push({start:gs,end:ge,nights:n});
    }
    const next=new Date(r.end); next.setDate(next.getDate()+1); if(next>cursor) cursor=next;
  }
  if(cursor<=toDate) { const n=diffDays(cursor,toDate)+1; if(n>=1) gaps.push({start:new Date(cursor),end:new Date(toDate),nights:n}); }
  return gaps;
}

function windowsInGap(gap, n) {
  const wins=[]; if(gap.nights<n) return wins;
  let s=new Date(gap.start);
  while(true) { const e=addDays(s,n-1); if(e>gap.end) break; wins.push({start:new Date(s),end:new Date(e),nights:n}); s=addDays(s,1); }
  return wins;
}

function groupByMonth(windows) {
  const map={};
  for(const w of windows) {
    const key=`${w.start.getFullYear()}-${String(w.start.getMonth()).padStart(2,'0')}`;
    if(!map[key]) map[key]={year:w.start.getFullYear(),month:w.start.getMonth(),windows:[]};
    map[key].windows.push(w);
  }
  return Object.values(map).sort((a,b)=>a.year-b.year||a.month-b.month);
}

async function runSearch() {
  hideError();
  const token=document.getElementById('apiToken').value.trim();
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  const minN=parseInt(document.getElementById('minNights').value)||3;
  const activeNights=[...document.querySelectorAll('.night-btn.active')].map(b=>parseInt(b.dataset.n)).filter(n=>n>=minN);

  if(!token){showError('Token no configurado.');return;}
  if(!from||!to){showError('Selecciona fechas.');return;}
  if(activeNights.length===0){showError('Selecciona al menos un rango de noches.');return;}

  const btn=document.getElementById('btnSearch'); btn.disabled=true;
  document.getElementById('resultsArea').innerHTML='';
  document.getElementById('emptyState').classList.remove('visible');
  document.getElementById('summaryStrip').classList.remove('visible');
  document.getElementById('roomsPanel').classList.remove('visible');
  document.getElementById('programsSection').classList.remove('visible');

  setStatus('Consultando programas…',true);
  try {
    const programs=await fetchAll(token);
    setStatus(`Obteniendo datos de habitaciones (${programs.length} programas)…`,true);

    let regs=[];
    try { regs=await fetchRegistrations(token,from,to); } catch(e){}

    // Debug info
    const rooms=[...new Set(regs.map(r=>r.room).filter(Boolean))].sort();
    const lodgings=[...new Set(regs.map(r=>r.lodging).filter(Boolean))].sort();
    document.getElementById('debugPanel').textContent=JSON.stringify({
      total_programs: programs.length,
      total_registrations_in_period: regs.length,
      rooms_found: rooms,
      lodging_types_found: lodgings,
      registration_sample: regs.slice(0,3).map(r=>({name:r.full_name,room:r.room,lodging:r.lodging,start:r.start_date,end:r.end_date})),
      program_sample: programs.slice(0,3).map(p=>({name:p.name,start:p.start_date,end:p.end_date}))
    },null,2);

    const fromDate=parseISO(from), toDate=parseISO(to);
    const gaps=findGaps(programs,fromDate,toDate);

    // Generate all windows
    const allWindows=[];
    for(const n of activeNights) for(const gap of gaps) allWindows.push(...windowsInGap(gap,n));

    setStatus('',false);

    // Summary
    const strip=document.getElementById('summaryStrip'); strip.innerHTML='';
    const counts={}; activeNights.forEach(n=>counts[n]=0);
    allWindows.forEach(w=>{ if(counts[w.nights]!==undefined) counts[w.nights]++; });
    Object.entries(counts).forEach(([n,c])=>{
      const chip=document.createElement('div'); chip.className='summary-chip';
      chip.innerHTML=`<span class="chip-count">${c}</span><span class="chip-label">${n} noches</span>`;
      strip.appendChild(chip);
    });
    strip.classList.add('visible');

    // Rooms panel
    const rp=document.getElementById('roomsPanel');
    const rg=document.getElementById('roomsGrid'); rg.innerHTML='';
    const rn=document.getElementById('roomsNote');
    if(rooms.length>0) {
      rooms.forEach(r=>{ const t=document.createElement('span'); t.className='room-tag'; t.textContent=r; rg.appendChild(t); });
      rn.textContent=`${rooms.length} habitación(es) en el período. Tipos de alojamiento: ${lodgings.join(', ')||'—'}. (${regs.length} registraciones consultadas)`;
    } else if(regs.length>0) {
      rn.textContent=`Se encontraron ${regs.length} registraciones pero sin habitaciones asignadas aún. Tipos de alojamiento: ${lodgings.join(', ')||'—'}.`;
    } else {
      rn.textContent='No se encontraron registraciones en este período. Para ver habitaciones disponibles, asegúrate de que haya reservas en Retreat Guru con rooms asignadas.';
    }
    rp.classList.add('visible');

    // Render months
    renderByMonth(allWindows);
    renderProgramsList(programs,fromDate,toDate);
    document.getElementById('programsSection').classList.add('visible');

  } catch(e) { setStatus('',false); showError('Error: '+e.message); }
  btn.disabled=false;
}

function renderByMonth(windows) {
  const area=document.getElementById('resultsArea'); area.innerHTML='';
  if(windows.length===0){ document.getElementById('emptyState').classList.add('visible'); return; }
  const byMonth=groupByMonth(windows);
  byMonth.forEach((md,mi)=>{
    const sec=document.createElement('div'); sec.className='month-section'; sec.style.animationDelay=`${mi*40}ms`;
    sec.innerHTML=`<div class="month-header"><span class="month-name">${MONTHS[md.month]} ${md.year}</span><span class="month-count">${md.windows.length} ventana${md.windows.length!==1?'s':''}</span></div>`;
    const byN={};
    md.windows.forEach(w=>{ if(!byN[w.nights]) byN[w.nights]=[]; byN[w.nights].push(w); });
    Object.entries(byN).sort((a,b)=>a[0]-b[0]).forEach(([n,wins])=>{
      const ng=document.createElement('div'); ng.className='night-group';
      ng.innerHTML=`<div class="night-group-header">${n} noches · ${wins.length} opción${wins.length!==1?'es':''}</div>`;
      const list=document.createElement('div'); list.className='windows-list';
      wins.forEach(w=>{
        const chip=document.createElement('div'); chip.className=`window-chip wc-${Math.min(parseInt(n),7)}`;
        chip.title='Clic para copiar';
        chip.innerHTML=`<span class="window-dates">${fmtShort(w.start)} — ${fmtShort(w.end)}</span><span class="window-dow">${DAYS[w.start.getDay()]} → ${DAYS[w.end.getDay()]}</span>`;
        chip.addEventListener('click',()=>{
          const txt=`Check-in: ${fmtShort(w.start)} ${w.start.getFullYear()}  |  Check-out: ${fmtShort(w.end)} ${w.end.getFullYear()}  |  ${w.nights} noches`;
          navigator.clipboard.writeText(txt).then(()=>{ const t=document.getElementById('copiedTip'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); });
        });
        list.appendChild(chip);
      });
      ng.appendChild(list); sec.appendChild(ng);
    });
    area.appendChild(sec);
  });
}

function renderProgramsList(programs, fromDate, toDate) {
  const list=document.getElementById('programsList'); list.innerHTML='';
  programs.filter(p=>p.start_date&&p.end_date&&parseISO(p.end_date)>=fromDate&&parseISO(p.start_date)<=toDate)
    .sort((a,b)=>a.start_date.localeCompare(b.start_date))
    .forEach(p=>{
      const row=document.createElement('div'); row.className='prog-row';
      row.innerHTML=`<span class="prog-name">${p.name||'—'}</span><span class="prog-range">${p.start_date} → ${p.end_date}</span><span class="prog-nights-badge">${diffDays(parseISO(p.start_date),parseISO(p.end_date))}n</span>`;
      list.appendChild(row);
    });
}

function togglePrograms() {
  document.getElementById('programsToggle').classList.toggle('open');
  document.getElementById('programsList').classList.toggle('open');
}
</script>
</body>
</html>
